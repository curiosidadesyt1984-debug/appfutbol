<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AF1CIONADOS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <div class="login-logo">&#9917;</div>
      <h1>AF1CIONADOS</h1>
      <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username" required>
        <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit">Entrar</button>
        <p id="loginError" class="login-error hidden">Usuario o contraseña incorrectos</p>
      </form>
    </div>
  </div>

  <div id="appContainer" class="app-container hidden">
    <button id="menuToggle" class="menu-toggle" aria-label="Menú">&#9776;</button>

    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>FUTBOL</h2>
      </div>
      <ul id="navList" class="nav-list"></ul>
    </nav>

    <div id="overlay" class="overlay"></div>

    <main id="main" class="main">
      <div class="topbar">
        <ol id="breadcrumbs" class="breadcrumbs"></ol>
      </div>
      <div id="content" class="content"></div>
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Cargando...</span>
      </div>
      <div id="error" class="error hidden"></div>
    </main>

    <div id="player" class="player hidden">
      <div class="player-header">
        <span id="playerTitle"></span>
        <div class="player-actions">
          <a id="playerDirectLink" class="player-direct-link" href="#" target="_blank" rel="noopener noreferrer" title="Abrir en navegador">&#128279;</a>
          <button id="playerClose" class="player-close">&times;</button>
        </div>
      </div>
      <div class="player-body">
        <iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>
      </div>
    </div>
  </div>

  <script src="js/parser.js"></script>
  <script src="js/filter.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
